<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Join Stream WhatsApp Group</title>
<meta name="theme-color" content="#25D366">
<meta name="description" content="You're in! Tap to join the Stream WhatsApp community now.">

<!-- Auto-redirect after 3 seconds in case user doesn't tap -->
<meta http-equiv="refresh" content="3;url=https://chat.whatsapp.com/HJ4bS879p9DFHSxASTrr1G">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
body{
  background:linear-gradient(135deg,#0a1f0e 0%,#062814 100%);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
  text-align:center;
}
.box{max-width:420px;width:100%}

.check{
  width:88px;height:88px;
  background:#25D366;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  box-shadow:0 8px 32px rgba(37,211,102,.45);
}
.check svg{width:44px;height:44px;color:#fff}

h1{
  font-size:32px;
  font-weight:800;
  margin-bottom:12px;
  line-height:1.2;
  letter-spacing:-0.5px;
}
.sub{
  font-size:17px;
  color:rgba(255,255,255,.85);
  margin-bottom:8px;
  line-height:1.5;
}
.urgent{
  font-size:15px;
  color:#FFD93D;
  margin-bottom:32px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.urgent svg{width:18px;height:18px;flex:0 0 auto}

.cta{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  background:#25D366;
  color:#fff;
  padding:22px 24px;
  border-radius:16px;
  font-size:19px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 6px 24px rgba(37,211,102,.5);
  margin-bottom:16px;
  transition:transform .15s, box-shadow .15s;
}
.cta:active{transform:scale(.98);box-shadow:0 4px 16px rgba(37,211,102,.4)}
.cta svg{width:24px;height:24px;flex:0 0 auto}
.cta .arrow{width:20px;height:20px}

.warning{
  font-size:13px;
  color:rgba(255,255,255,.6);
  margin-top:20px;
  line-height:1.5;
}
.timer{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(255,77,109,.15);
  border:1px solid rgba(255,77,109,.4);
  color:#ff8a9b;
  padding:8px 16px;
  border-radius:100px;
  font-size:13px;
  font-weight:600;
  margin-bottom:24px;
}
.timer svg{width:14px;height:14px;flex:0 0 auto}

#count{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="box">
    <div class="check">
      <!-- Checkmark icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <div class="timer">
      <!-- Clock icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <span>Redirecting in <span id="count">3</span>s...</span>
    </div>

    <h1>You're In!</h1>
    <p class="sub">Your spot is reserved. Tap below to join the WhatsApp group NOW.</p>
    <p class="urgent">
      <!-- Warning icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      Class starts when group fills (1,020 spots)
    </p>

    <a class="cta" href="https://chat.whatsapp.com/HJ4bS879p9DFHSxASTrr1G">
      <!-- WhatsApp icon (official brand) -->
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
      </svg>
      <span>JOIN WHATSAPP GROUP</span>
      <!-- Arrow icon -->
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </a>

    <p class="warning">If WhatsApp doesn't open automatically, tap the green button above.</p>
  </div>

<script>
// Live countdown
var n=3,c=document.getElementById('count');
var t=setInterval(function(){
  n--;
  if(n<0){clearInterval(t);return}
  c.textContent=n;
},1000);

// Backup auto-redirect via JS
setTimeout(function(){
  window.location.href="https://chat.whatsapp.com/HJ4bS879p9DFHSxASTrr1G";
},2800);
</script>
</body>
</html>
